spring:
  jpa:
    show-sql: false

management:
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://zipkin:9411/api/v2/spans}

logging:
  level:
    root: INFO
    com.tradingsaas: INFO

server:
  tomcat:
    max-threads: 200
    min-spare-threads: 10

trading-core:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://trademind.es}
