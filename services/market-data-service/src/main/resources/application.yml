spring:
  application:
    name: market-data-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:trading_saas}
    username: ${POSTGRES_USER:trading_user}
    password: ${POSTGRES_PASSWORD:dev_password_change_in_prod}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: market_data
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: market_data
    baseline-on-migrate: false
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

server:
  port: 8081
  compression:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never

management:
  metrics:
    tags:
      service: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    redis:
      enabled: true
    rabbit:
      enabled: true
    diskspace:
      enabled: false

market-data:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  yahoo:
    base-url: https://query1.finance.yahoo.com
    timeout-seconds: 10
  symbols: ${STOCK_SYMBOLS:AAPL,MSFT,GOOGL,TSLA,AMZN,NVDA,META,AMD}
  ingestion:
    batch-size: ${DATA_INGESTION_BATCH_SIZE:50}
    weekday-cron: ${DATA_INGESTION_CRON:0 0 18 ? * MON-FRI}
    zone: ${DATA_INGESTION_ZONE:America/New_York}
    tracked-symbols:
      - ticker: AAPL
        name: Apple Inc.
        exchange: NASDAQ
        active: true
      - ticker: MSFT
        name: Microsoft Corporation
        exchange: NASDAQ
        active: true
      - ticker: GOOGL
        name: Alphabet Inc.
        exchange: NASDAQ
        active: true
      - ticker: TSLA
        name: Tesla, Inc.
        exchange: NASDAQ
        active: true
      - ticker: AMZN
        name: Amazon.com, Inc.
        exchange: NASDAQ
        active: true
      - ticker: NVDA
        name: NVIDIA Corporation
        exchange: NASDAQ
        active: true
      - ticker: META
        name: Meta Platforms, Inc.
        exchange: NASDAQ
        active: true
      - ticker: AMD
        name: Advanced Micro Devices, Inc.
        exchange: NASDAQ
        active: true
      - ticker: BTC-USD
        name: Bitcoin USD
        exchange: CRYPTO
        active: true
      - ticker: ETH-USD
        name: Ethereum USD
        exchange: CRYPTO
        active: true
  events:
    prices-updated-routing-key: ${MARKET_DATA_PRICES_UPDATED_ROUTING_KEY:market-data.prices.updated}

resilience4j:
  circuitbreaker:
    instances:
      yahoo-finance:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      yahoo-finance:
        max-attempts: 3
        wait-duration: 1s
