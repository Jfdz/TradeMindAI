apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-saas-ingress
  namespace: trading-saas
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Strip /api/market-data prefix before forwarding to service
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - trading-saas.example.com
        - api.trading-saas.example.com
      secretName: trading-saas-tls
  rules:
    # Frontend — catch-all for the web app
    - host: trading-saas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 3000

    # Backend API — path-based routing to microservices
    - host: api.trading-saas.example.com
      http:
        paths:
          - path: /api/v1/symbols(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: market-data-service
                port:
                  number: 8081
          - path: /api/v1/prices(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: market-data-service
                port:
                  number: 8081
          - path: /api/v1/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/signals(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/strategies(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/backtests(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/subscriptions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
---
# cert-manager ClusterIssuer for Let's Encrypt production certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@trading-saas.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
