apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-saas-ingress
  namespace: trading-saas
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.trademind.es
      secretName: trading-saas-tls
  rules:
    # Backend API — path-based routing to microservices
    # Frontend (trademind.es) is served by Vercel — no K8s rule needed
    - host: api.trademind.es
      http:
        paths:
          - path: /api/v1/symbols(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: market-data-service
                port:
                  number: 8081
          - path: /api/v1/prices(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: market-data-service
                port:
                  number: 8081
          - path: /api/v1/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/signals(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/strategies(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/backtests(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
          - path: /api/v1/subscriptions(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
---
# Separate ingress for /actuator paths — no rewrite so Spring Boot receives the full path
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trading-saas-actuator-ingress
  namespace: trading-saas
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.trademind.es
      secretName: trading-saas-tls
  rules:
    - host: api.trademind.es
      http:
        paths:
          - path: /actuator/
            pathType: Prefix
            backend:
              service:
                name: trading-core-service
                port:
                  number: 8082
---
# cert-manager ClusterIssuer for Let's Encrypt production certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@trademind.es
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
