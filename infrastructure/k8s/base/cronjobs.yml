apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-retraining
  namespace: trading-saas
  labels:
    app: model-retraining
spec:
  schedule: "0 2 * * 0"  # Sunday 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: model-retraining
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:8.7.1
              command:
                - sh
                - -c
                - |
                  curl -sf -X POST \
                    http://ai-engine.trading-saas.svc.cluster.local:8000/api/v1/models/train \
                    -H "Content-Type: application/json" \
                    -d '{"version_tag":"weekly","max_epochs":50,"patience":10}' \
                    && echo "Training triggered successfully"
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 65534
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
