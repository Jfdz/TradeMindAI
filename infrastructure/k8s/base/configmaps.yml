apiVersion: v1
kind: ConfigMap
metadata:
  name: market-data-service-config
  namespace: trading-saas
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8081"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin.monitoring.svc.cluster.local:9411/api/v2/spans
  LOGGING_LEVEL_ROOT: INFO
  APP_CORS_ALLOWED_ORIGINS: https://trademind.es

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-core-service-config
  namespace: trading-saas
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8082"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0.1"
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin.monitoring.svc.cluster.local:9411/api/v2/spans
  LOGGING_LEVEL_ROOT: INFO
  JWT_EXPIRATION_MS: "900000"
  JWT_REFRESH_EXPIRATION_MS: "604800000"
  APP_CORS_ALLOWED_ORIGINS: https://trademind.es

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-engine-config
  namespace: trading-saas
data:
  APP_ENV: production
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: INFO
  MODEL_PATH: /app/models
  PREDICTION_BATCH_SIZE: "32"
  CORS_ALLOWED_ORIGINS: https://trademind.es

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-config
  namespace: trading-saas
data:
  NODE_ENV: production
  PORT: "3000"
  nextauth-url: https://trademind.es
  api-base-url: https://api.trademind.es
