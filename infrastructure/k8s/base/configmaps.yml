apiVersion: v1
kind: ConfigMap
metadata:
  name: market-data-service-config
  namespace: trading-saas
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8081"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
  LOGGING_LEVEL_ROOT: INFO

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-core-service-config
  namespace: trading-saas
data:
  SPRING_PROFILES_ACTIVE: prod
  SERVER_PORT: "8082"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: never
  LOGGING_LEVEL_ROOT: INFO
  JWT_EXPIRATION_MS: "900000"
  JWT_REFRESH_EXPIRATION_MS: "604800000"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-engine-config
  namespace: trading-saas
data:
  APP_ENV: production
  HOST: "0.0.0.0"
  PORT: "8000"
  LOG_LEVEL: INFO
  MODEL_PATH: /app/models
  PREDICTION_BATCH_SIZE: "32"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-config
  namespace: trading-saas
data:
  NODE_ENV: production
  PORT: "3000"
  nextauth-url: https://trading-saas.example.com
  api-base-url: https://api.trading-saas.example.com
