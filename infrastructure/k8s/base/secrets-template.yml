# secrets-template.yml
#
# DO NOT commit real values. This file documents the Secret structure only.
# Populate secrets via kubectl (copy-paste the block for each secret and fill the blanks):
#
#   kubectl create secret generic postgres-credentials \
#     --from-literal=host=postgres.trading-saas.svc.cluster.local \
#     --from-literal=username=trading_user \
#     --from-literal=password=$(openssl rand -base64 24) \
#     --from-literal=market-data-db=trading_saas \
#     --from-literal=trading-core-db=trading_saas \
#     --from-literal=ai-engine-db=trading_saas \
#     -n trading-saas
#
#   kubectl create secret generic redis-credentials \
#     --from-literal=host=redis.trading-saas.svc.cluster.local \
#     --from-literal=password=$(openssl rand -base64 24) \
#     -n trading-saas
#
#   kubectl create secret generic rabbitmq-credentials \
#     --from-literal=host=rabbitmq.trading-saas.svc.cluster.local \
#     --from-literal=username=trading_user \
#     --from-literal=password=$(openssl rand -base64 24) \
#     -n trading-saas
#
#   kubectl create secret generic jwt-secret \
#     --from-literal=secret=$(openssl rand -base64 48) \
#     -n trading-saas
#
#   kubectl create secret generic nextauth-secret \
#     --from-literal=secret=$(openssl rand -base64 32) \
#     -n trading-saas
#
# Base64 reference for known in-cluster hostnames (no passwords here):
#   postgres.trading-saas.svc.cluster.local → cG9zdGdyZXMudHJhZGluZy1zYWFzLnN2Yy5jbHVzdGVyLmxvY2Fs
#   redis.trading-saas.svc.cluster.local    → cmVkaXMudHJhZGluZy1zYWFzLnN2Yy5jbHVzdGVyLmxvY2Fs
#   rabbitmq.trading-saas.svc.cluster.local → cmFiYml0bXEudHJhZGluZy1zYWFzLnN2Yy5jbHVzdGVyLmxvY2Fs
#   trading_saas (db name)                  → dHJhZGluZ19zYWFz
#   trading_user (db user)                  → dHJhZGluZ191c2Vy

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: trading-saas
type: Opaque
data:
  host: cG9zdGdyZXMudHJhZGluZy1zYWFzLnN2Yy5jbHVzdGVyLmxvY2Fs  # postgres.trading-saas.svc.cluster.local
  username: dHJhZGluZ191c2Vy                                      # trading_user
  password: UkVQTEFDRV9NRQ==                                      # REPLACE_ME — openssl rand -base64 24
  market-data-db: dHJhZGluZ19zYWFz                                # trading_saas
  trading-core-db: dHJhZGluZ19zYWFz                               # trading_saas
  ai-engine-db: dHJhZGluZ19zYWFz                                  # trading_saas

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: trading-saas
type: Opaque
data:
  host: cmVkaXMudHJhZGluZy1zYWFzLnN2Yy5jbHVzdGVyLmxvY2Fs  # redis.trading-saas.svc.cluster.local
  password: UkVQTEFDRV9NRQ==                                 # REPLACE_ME — openssl rand -base64 24

---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: trading-saas
type: Opaque
data:
  host: cmFiYml0bXEudHJhZGluZy1zYWFzLnN2Yy5jbHVzdGVyLmxvY2Fs  # rabbitmq.trading-saas.svc.cluster.local
  username: dHJhZGluZ191c2Vy                                      # trading_user
  password: UkVQTEFDRV9NRQ==                                      # REPLACE_ME — openssl rand -base64 24

---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: trading-saas
type: Opaque
data:
  secret: UkVQTEFDRV9NRQ== # REPLACE_ME — openssl rand -base64 48 (minimum 256-bit)

---
apiVersion: v1
kind: Secret
metadata:
  name: nextauth-secret
  namespace: trading-saas
type: Opaque
data:
  secret: UkVQTEFDRV9NRQ== # REPLACE_ME — openssl rand -base64 32
