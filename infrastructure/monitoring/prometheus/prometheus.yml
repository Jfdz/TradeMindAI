global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: market-data-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - market-data-service:8081

  - job_name: trading-core-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - trading-core-service:8082
