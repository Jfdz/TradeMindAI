global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: market-data-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - market-data-service:8081
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: market-data-service

  - job_name: trading-core-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - trading-core-service:8082
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: trading-core-service

  - job_name: ai-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - ai-engine:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: ai-engine
