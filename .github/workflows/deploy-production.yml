name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Git SHA to deploy (defaults to the triggering commit)
        required: false
        type: string
      confirm:
        description: Type "deploy" to confirm production deployment
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Confirmation string must be 'deploy'. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi

  verify-images:
    name: Verify release images exist
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_SHA: ${{ github.event.inputs.sha || github.sha }}
      DEPLOY_NAMESPACE: trading-saas
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist
        run: |
          set -euo pipefail
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          for image in market-data-service trading-core-service ai-engine web-app; do
            docker buildx imagetools inspect "${REPO}/${image}:${DEPLOY_SHA}" >/dev/null
          done

  approval:
    name: Manual approval gate
    needs: verify-images
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://trademind.es
    steps:
      - name: Approved
        run: echo "Production deployment approved by ${{ github.actor }}"

  deploy-production:
    name: Deploy to production
    needs: approval
    runs-on: self-hosted
    permissions:
      contents: write

    env:
      DEPLOY_SHA: ${{ github.event.inputs.sha || github.sha }}
      DEPLOY_NAMESPACE: trading-saas

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Apply namespace and base manifests
        run: |
          set -euo pipefail
          kubectl apply -f infrastructure/k8s/namespaces/${DEPLOY_NAMESPACE}.yml
          kubectl apply -k infrastructure/k8s/base/

      - name: Rolling deploy — market-data-service
        run: |
          set -euo pipefail
          kubectl set image deployment/market-data-service \
            market-data-service=ghcr.io/${GITHUB_REPOSITORY,,}/market-data-service:${{ env.DEPLOY_SHA }} \
            -n "${DEPLOY_NAMESPACE}"
          kubectl rollout status deployment/market-data-service -n "${DEPLOY_NAMESPACE}" --timeout=10m

      - name: Rolling deploy — trading-core-service
        run: |
          set -euo pipefail
          kubectl set image deployment/trading-core-service \
            trading-core-service=ghcr.io/${GITHUB_REPOSITORY,,}/trading-core-service:${{ env.DEPLOY_SHA }} \
            -n "${DEPLOY_NAMESPACE}"
          kubectl rollout status deployment/trading-core-service -n "${DEPLOY_NAMESPACE}" --timeout=10m

      - name: Rolling deploy — ai-engine
        run: |
          set -euo pipefail
          kubectl set image deployment/ai-engine \
            ai-engine=ghcr.io/${GITHUB_REPOSITORY,,}/ai-engine:${{ env.DEPLOY_SHA }} \
            -n "${DEPLOY_NAMESPACE}"
          kubectl rollout status deployment/ai-engine -n "${DEPLOY_NAMESPACE}" --timeout=10m

      - name: Rolling deploy — web-app
        run: |
          set -euo pipefail
          kubectl set image deployment/web-app \
            web-app=ghcr.io/${GITHUB_REPOSITORY,,}/web-app:${{ env.DEPLOY_SHA }} \
            -n "${DEPLOY_NAMESPACE}"
          kubectl rollout status deployment/web-app -n "${DEPLOY_NAMESPACE}" --timeout=10m

      - name: Production smoke tests
        run: |
          set -euo pipefail
          echo "Waiting for production ingress to stabilize..."
          sleep 60
          retry_curl() {
            curl --fail --silent --show-error --retry 5 --retry-delay 10 --retry-all-errors "$@"
          }
          retry_curl https://trademind.es/
          retry_curl https://api.trademind.es/actuator/health
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 10 --retry-all-errors -X POST \
            https://api.trademind.es/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.invalid","password":"invalid"}')
          if [ "$STATUS" != "401" ]; then
            echo "Auth endpoint unexpected response: $STATUS (expected 401)"
            exit 1
          fi
          echo "Production smoke tests passed"

      - name: Rollback on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "Production deploy FAILED — initiating rollback"
          kubectl rollout undo deployment/market-data-service -n "${DEPLOY_NAMESPACE}"
          kubectl rollout undo deployment/trading-core-service -n "${DEPLOY_NAMESPACE}"
          kubectl rollout undo deployment/ai-engine -n "${DEPLOY_NAMESPACE}"
          kubectl rollout undo deployment/web-app -n "${DEPLOY_NAMESPACE}"
          echo "Rollback complete"
          exit 1

      - name: Tag release
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHORT_SHA=$(echo "${{ env.DEPLOY_SHA }}" | cut -c1-7)
          git tag "prod-$(date +%Y%m%d-%H%M)-${SHORT_SHA}"
          git push origin --tags
