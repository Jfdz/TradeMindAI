name: OWASP Dependency Check

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  market-data-service:
    name: market-data-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/market-data-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Dependency scan
        run: mvn -q org.owasp:dependency-check-maven:12.2.0:check -DfailBuildOnCVSS=7 -DnvdApiKey="$NVD_API_KEY"
        timeout-minutes: 30
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-market-data-service
          path: services/market-data-service/target/dependency-check-report.html

  trading-core-service:
    name: trading-core-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/trading-core-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Dependency scan
        run: mvn -q org.owasp:dependency-check-maven:12.2.0:check -DfailBuildOnCVSS=7 -DnvdApiKey="$NVD_API_KEY"
        timeout-minutes: 30
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-trading-core-service
          path: services/trading-core-service/target/dependency-check-report.html
