name: Deploy — Staging

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      sha:
        description: Git SHA to deploy (leave empty to use latest built image)
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  check-images:
    name: Verify CI images are ready
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      deploy-sha: ${{ steps.resolve-sha.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy SHA
        id: resolve-sha
        env:
          INPUT_SHA: ${{ github.event.inputs.sha }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGES="market-data-service trading-core-service ai-engine web-app"

          if [ -n "${INPUT_SHA}" ]; then
            echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No SHA provided — scanning last 30 commits for a complete image set..."
          for sha in $(git log --format='%H' -30); do
            found=true
            for image in ${IMAGES}; do
              if ! docker buildx imagetools inspect "${REPO}/${image}:${sha}" >/dev/null 2>&1; then
                found=false
                break
              fi
            done
            if [ "${found}" = "true" ]; then
              echo "Found complete image set at ${sha}"
              echo "sha=${sha}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "ERROR: No commit in the last 30 has all 4 images in GHCR. Run CI workflows first."
          exit 1

      - name: Verify all images exist for resolved SHA
        env:
          DEPLOY_SHA: ${{ steps.resolve-sha.outputs.sha }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          for image in market-data-service trading-core-service ai-engine web-app; do
            docker buildx imagetools inspect "${REPO}/${image}:${DEPLOY_SHA}" >/dev/null
            echo "✓ ${image}:${DEPLOY_SHA}"
          done

  deploy-staging:
    name: Deploy to staging
    needs: check-images
    runs-on: self-hosted
    env:
      DEPLOY_SHA: ${{ needs.check-images.outputs.deploy-sha }}
    environment:
      name: staging
      url: https://trademind.es

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply namespace and base manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespaces/trading-saas.yml
          kubectl apply -k infrastructure/k8s/base/

      - name: Wait for infrastructure to be ready
        run: |
          set -euo pipefail
          echo "Waiting for postgres..."
          kubectl rollout status statefulset/postgres -n trading-saas --timeout=3m
          kubectl exec -n trading-saas postgres-0 -- pg_isready -h 127.0.0.1 -p 5432 -U tradinguser
          echo "Waiting for redis..."
          kubectl rollout status deployment/redis -n trading-saas --timeout=2m
          echo "Waiting for rabbitmq..."
          kubectl rollout status statefulset/rabbitmq -n trading-saas --timeout=2m
          echo "Infrastructure ready"

      - name: Rolling deploy — market-data-service
        run: |
          kubectl set image deployment/market-data-service \
            market-data-service=ghcr.io/${GITHUB_REPOSITORY,,}/market-data-service:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/market-data-service -n trading-saas --timeout=5m

      - name: Rolling deploy — trading-core-service
        run: |
          kubectl set image deployment/trading-core-service \
            trading-core-service=ghcr.io/${GITHUB_REPOSITORY,,}/trading-core-service:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/trading-core-service -n trading-saas --timeout=5m

      - name: Rolling deploy — ai-engine
        run: |
          kubectl set image deployment/ai-engine \
            ai-engine=ghcr.io/${GITHUB_REPOSITORY,,}/ai-engine:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/ai-engine -n trading-saas --timeout=5m

      - name: Rolling deploy — web-app
        run: |
          kubectl set image deployment/web-app \
            web-app=ghcr.io/${GITHUB_REPOSITORY,,}/web-app:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/web-app -n trading-saas --timeout=5m

      - name: Smoke tests
        run: |
          set -euo pipefail
          echo "Waiting for ingress to stabilize..."
          sleep 30
          retry_curl() {
            curl --fail --silent --show-error --retry 3 --retry-delay 10 --retry-all-errors "$@"
          }
          retry_curl https://api.trademind.es/actuator/health
          echo "Smoke tests passed for SHA ${{ env.DEPLOY_SHA }}"

      - name: Notify on failure
        if: failure()
        run: echo "Staging deploy failed for SHA ${{ env.DEPLOY_SHA }}"
