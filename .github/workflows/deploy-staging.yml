name: Deploy — Staging

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      sha:
        description: Git SHA to deploy (defaults to the triggering commit)
        required: false
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  check-images:
    name: Verify CI images are ready
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      sha: ${{ steps.set-sha.outputs.sha }}
    steps:
      - name: Set SHA
        id: set-sha
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist
        env:
          DEPLOY_SHA: ${{ github.event.inputs.sha || github.sha }}
        run: |
          set -euo pipefail
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          for image in market-data-service trading-core-service ai-engine web-app; do
            docker buildx imagetools inspect "${REPO}/${image}:${DEPLOY_SHA}" >/dev/null
          done

  deploy-staging:
    name: Deploy to staging
    needs: check-images
    runs-on: self-hosted
    env:
      DEPLOY_SHA: ${{ github.event.inputs.sha || github.sha }}
    environment:
      name: staging
      url: https://trademind.es

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply namespace and base manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespaces/trading-saas.yml
          kubectl apply -k infrastructure/k8s/base/

      - name: Rolling deploy — market-data-service
        run: |
          kubectl set image deployment/market-data-service \
            market-data-service=ghcr.io/${GITHUB_REPOSITORY,,}/market-data-service:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/market-data-service -n trading-saas --timeout=5m

      - name: Rolling deploy — trading-core-service
        run: |
          kubectl set image deployment/trading-core-service \
            trading-core-service=ghcr.io/${GITHUB_REPOSITORY,,}/trading-core-service:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/trading-core-service -n trading-saas --timeout=5m

      - name: Rolling deploy — ai-engine
        run: |
          kubectl set image deployment/ai-engine \
            ai-engine=ghcr.io/${GITHUB_REPOSITORY,,}/ai-engine:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/ai-engine -n trading-saas --timeout=5m

      - name: Rolling deploy — web-app
        run: |
          kubectl set image deployment/web-app \
            web-app=ghcr.io/${GITHUB_REPOSITORY,,}/web-app:${{ env.DEPLOY_SHA }} \
            -n trading-saas
          kubectl rollout status deployment/web-app -n trading-saas --timeout=5m

      - name: Smoke tests
        run: |
          set -euo pipefail
          echo "Waiting for ingress to stabilize..."
          sleep 30
          retry_curl() {
            curl --fail --silent --show-error --retry 3 --retry-delay 10 --retry-all-errors "$@"
          }
          retry_curl https://trademind.es/
          retry_curl https://api.trademind.es/actuator/health
          echo "Smoke tests passed for SHA ${{ env.DEPLOY_SHA }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Staging deploy failed for SHA ${{ env.DEPLOY_SHA }}"
          # Add Slack/Teams notification here if needed
