name: CI - market-data-service

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "services/market-data-service/**"
      - ".github/workflows/ci-market-data.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/market-data-service/**"
      - ".github/workflows/ci-market-data.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/market-data-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trading_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: trading_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Check if project is bootstrapped
        id: check
        run: |
          if [ -f pom.xml ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pom.xml not found — skipping build/test (scaffold only)"
          fi

      - name: Set up Java 21
        if: steps.check.outputs.bootstrapped == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Build
        if: steps.check.outputs.bootstrapped == 'true'
        run: mvn compile -q

      - name: Run tests
        if: steps.check.outputs.bootstrapped == 'true'
        run: mvn test
        env:
          SPRING_PROFILES_ACTIVE: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: trading_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: trading_saas_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build Docker image
        if: steps.check.outputs.bootstrapped == 'true'
        run: docker build -t market-data-service:${{ github.sha }} .
