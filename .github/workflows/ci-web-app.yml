name: CI — web-app

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/web-app/**'
      - '.github/workflows/ci-web-app.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/web-app/**'
      - '.github/workflows/ci-web-app.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency scan
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE_URL: https://api.trading-saas.example.com

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-app-test-results
          path: services/web-app/coverage/

  docker-build-push:
    name: Docker Build & Push
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}/web-app" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/web-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    needs: docker-build-push
    if: github.event_name == 'push'
    secrets: inherit
    uses: ./.github/workflows/trivy-scan.yml
    with:
      image-ref: ghcr.io/jfdz/trademindai/web-app:${{ github.sha }}
      dockerfile: services/web-app/Dockerfile
      context: services/web-app
