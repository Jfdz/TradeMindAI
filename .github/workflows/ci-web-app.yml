name: CI - web-app

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "services/web-app/**"
      - ".github/workflows/ci-web-app.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/web-app/**"
      - ".github/workflows/ci-web-app.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web-app

    steps:
      - uses: actions/checkout@v4

      - name: Check if project is bootstrapped
        id: check
        run: |
          if [ -f package.json ]; then
            echo "bootstrapped=true" >> "$GITHUB_OUTPUT"
          else
            echo "bootstrapped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not found — skipping build/test (scaffold only)"
          fi

      - name: Set up Node.js 20
        if: steps.check.outputs.bootstrapped == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.check.outputs.bootstrapped == 'true'
        run: npm ci

      - name: Type check
        if: steps.check.outputs.bootstrapped == 'true'
        run: npm run type-check

      - name: Lint
        if: steps.check.outputs.bootstrapped == 'true'
        run: npm run lint

      - name: Run unit tests
        if: steps.check.outputs.bootstrapped == 'true'
        run: npm test -- --watchAll=false --coverage
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8082
          NEXT_PUBLIC_APP_NAME: TradeMindAI

      - name: Build
        if: steps.check.outputs.bootstrapped == 'true'
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8082
          NEXT_PUBLIC_APP_NAME: TradeMindAI
          NEXTAUTH_SECRET: test-nextauth-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Build Docker image
        if: steps.check.outputs.bootstrapped == 'true'
        run: docker build -t web-app:${{ github.sha }} .
