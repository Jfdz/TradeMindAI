name: CI — market-data-service

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/market-data-service/**'
      - '.github/workflows/ci-market-data-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/market-data-service/**'
      - '.github/workflows/ci-market-data-service.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/market-data-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Dependency scan
        run: mvn -q org.owasp:dependency-check-maven:12.2.0:check -DfailBuildOnCVSS=7 -DnvdApiKey="$NVD_API_KEY"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Build and test
        run: mvn clean verify -q
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: market-data-test-results
          path: services/market-data-service/target/surefire-reports/

  docker-build-push:
    name: Docker Build & Push
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}/market-data-service" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/market-data-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    needs: docker-build-push
    if: github.event_name == 'push'
    permissions:
      contents: read
      actions: read
      security-events: write
    secrets: inherit
    uses: ./.github/workflows/trivy-scan.yml
    with:
      image-ref: ghcr.io/jfdz/trademindai/market-data-service:${{ github.sha }}
      dockerfile: services/market-data-service/Dockerfile
      context: services/market-data-service
